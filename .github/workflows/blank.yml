name: BTC Sniper Bot

on:
  schedule:
    - cron: "0 */4 * * *"   # har 4 soatda (UTC bo'yicha)
  workflow_dispatch: {}       # "Run workflow" tugmasi bilan qo'lda ham ishga tushirish

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'ni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kutubxonalarni o'rnatish
        run: pip install pandas requests

      - name: Botni ishga tushirish
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: python3 bot.py
